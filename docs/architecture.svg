<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700" letter-spacing="0.5">E-commerce Platform — Microservices Architecture</text>

  <!-- ─── BROWSER ─── -->
  <rect x="30" y="220" width="110" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="85" y="245" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">BROWSER</text>
  <text x="85" y="262" text-anchor="middle" fill="#64748b" font-size="10">User</text>

  <!-- ─── DOCKER COMPOSE BOUNDARY ─── -->
  <rect x="175" y="65" width="695" height="490" rx="10" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="522" y="84" text-anchor="middle" fill="#475569" font-size="11" font-weight="600" letter-spacing="1">DOCKER COMPOSE  ·  ecommerce_network</text>

  <!-- ─── FRONTEND ─── -->
  <rect x="195" y="210" width="150" height="80" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="270" y="241" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="700">FRONTEND</text>
  <text x="270" y="257" text-anchor="middle" fill="#64748b" font-size="10">React + Vite</text>
  <text x="270" y="272" text-anchor="middle" fill="#475569" font-size="10">Nginx  :8080</text>

  <!-- ─── API GATEWAY ─── -->
  <rect x="390" y="210" width="155" height="80" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="467" y="241" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="700">API GATEWAY</text>
  <text x="467" y="257" text-anchor="middle" fill="#64748b" font-size="10">NestJS · HTTP</text>
  <text x="467" y="272" text-anchor="middle" fill="#475569" font-size="10">:3000</text>

  <!-- ─── CATALOG SERVICE ─── -->
  <rect x="595" y="130" width="155" height="80" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="672" y="161" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">CATALOG SERVICE</text>
  <text x="672" y="177" text-anchor="middle" fill="#64748b" font-size="10">NestJS · TCP</text>
  <text x="672" y="192" text-anchor="middle" fill="#475569" font-size="10">:3001</text>

  <!-- ─── ORDERS SERVICE ─── -->
  <rect x="595" y="290" width="155" height="80" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="672" y="321" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">ORDERS SERVICE</text>
  <text x="672" y="337" text-anchor="middle" fill="#64748b" font-size="10">NestJS · TCP</text>
  <text x="672" y="352" text-anchor="middle" fill="#475569" font-size="10">:3002</text>

  <!-- ─── CATALOG DB ─── -->
  <rect x="595" y="450" width="155" height="80" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- DB cylinder shape hint -->
  <ellipse cx="672" cy="467" rx="40" ry="8" fill="none" stroke="#10b981" stroke-width="1"/>
  <text x="672" y="498" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">CATALOG DB</text>
  <text x="672" y="514" text-anchor="middle" fill="#64748b" font-size="10">PostgreSQL  :5432</text>

  <!-- ─── ORDERS DB ─── -->
  <rect x="770" y="290" width="85" height="80" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <ellipse cx="812" cy="307" rx="26" ry="6" fill="none" stroke="#f59e0b" stroke-width="1"/>
  <text x="812" y="336" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">ORDERS DB</text>
  <text x="812" y="350" text-anchor="middle" fill="#64748b" font-size="9">PostgreSQL</text>
  <text x="812" y="363" text-anchor="middle" fill="#475569" font-size="9">:5433</text>

  <!-- ══════ ARROWS ══════ -->

  <!-- Browser → Frontend  (HTTP) -->
  <line x1="140" y1="250" x2="192" y2="250" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="166" y="243" text-anchor="middle" fill="#64748b" font-size="9">HTTP</text>

  <!-- Frontend → API Gateway  (HTTP REST) -->
  <line x1="345" y1="250" x2="387" y2="250" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="366" y="243" text-anchor="middle" fill="#64748b" font-size="9">HTTP/REST</text>

  <!-- API Gateway → Catalog Service  (TCP) -->
  <line x1="545" y1="232" x2="592" y2="195" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="575" y="208" text-anchor="middle" fill="#64748b" font-size="9">TCP</text>

  <!-- API Gateway → Orders Service  (TCP) -->
  <line x1="545" y1="268" x2="592" y2="318" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="575" y="302" text-anchor="middle" fill="#64748b" font-size="9">TCP</text>

  <!-- Orders Service → Catalog Service  (TCP — product validation) -->
  <line x1="672" y1="290" x2="672" y2="213" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <text x="700" y="254" text-anchor="start" fill="#f97316" font-size="9">validate</text>
  <text x="700" y="265" text-anchor="start" fill="#f97316" font-size="9">products</text>

  <!-- Catalog Service → Catalog DB -->
  <line x1="672" y1="210" x2="672" y2="447" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Orders Service → Orders DB -->
  <line x1="750" y1="330" x2="768" y2="330" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- ══════ LEGEND ══════ -->
  <rect x="195" y="430" width="370" height="110" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="215" y="452" fill="#94a3b8" font-size="11" font-weight="600">Legend</text>

  <!-- Legend items -->
  <line x1="215" y1="470" x2="255" y2="470" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="262" y="474" fill="#64748b" font-size="10">HTTP / REST communication</text>

  <line x1="215" y1="491" x2="255" y2="491" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <text x="262" y="495" fill="#64748b" font-size="10">Internal TCP (product validation)</text>

  <rect x="215" y="503" width="16" height="10" rx="3" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <text x="237" y="513" fill="#64748b" font-size="10">Catalog scope</text>

  <rect x="310" y="503" width="16" height="10" rx="3" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="332" y="513" fill="#64748b" font-size="10">Orders scope</text>

  <rect x="215" y="520" width="16" height="10" rx="3" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <text x="237" y="530" fill="#64748b" font-size="10">Gateway / Frontend</text>
</svg>
