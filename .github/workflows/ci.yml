name: CI/CD Microservices

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, catalog-service, orders-service]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './${{ matrix.service }}/package-lock.json'

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: npm ci

      - name: Build service
        working-directory: ./${{ matrix.service }}
        run: npm run build

      - name: Run tests (if any)
        working-directory: ./${{ matrix.service }}
        run: npm run test --if-present

  release:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Git User
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Bump versions (npm version patch)
        run: |
          for service in api-gateway catalog-service orders-service; do
            cd $service
            npm version patch --no-git-tag-version
            cd ..
          done

      - name: Generate CHANGELOG entry
        run: |
          VERSION=$(node -p "require('./api-gateway/package.json').version")
          {
            echo "## [${VERSION}] - $(date -u +%Y-%m-%d)"
            echo ""
            git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD -- api-gateway catalog-service orders-service || true
            echo ""
            echo ""
          } | cat - CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md || \
          {
            echo "## [${VERSION}] - $(date -u +%Y-%m-%d)" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s" -20 -- api-gateway catalog-service orders-service >> CHANGELOG.md || true
            echo "" >> CHANGELOG.md
          }

      - name: Commit and tag release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./api-gateway/package.json').version")
          git add api-gateway/package.json catalog-service/package.json orders-service/package.json CHANGELOG.md
          git commit -m "chore(release): bump to v${VERSION} [skip ci]" || echo "Nothing to commit"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Simulate Cloud Deployment
        run: |
          VERSION=$(node -p "require('./api-gateway/package.json').version")
          echo "Deploying v${VERSION} to production..."
          echo "Deployment finished successfully."
